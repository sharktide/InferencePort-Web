<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 0 100 100" width="100" height="100">
  <defs>
    <!-- Subtle glow effect for the play button -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Vibrant gradient for the modern AI/playground aesthetic -->
    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36d1dc" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#5b86e5" /> <!-- Blue -->
    </linearGradient>
  </defs>

  <!-- Background Container -->
  <rect width="90" height="100" rx="20" fill="#131a22" />

  <!-- Chat Bubble (Representing LLM Interaction) -->
  <path d="M 20,25 L 70,25 A 10 10 0 0 1 80,35 L 80,65 A 10 10 0 0 1 70,75 L 35,75 L 20,90 L 30,75 L 20,75 A 10 10 0 0 1 10,65 L 10,35 A 10 10 0 0 1 20,25 Z" 
        fill="#1c2533" 
        stroke="#2d3b4c" 
        stroke-width="1.5" 
        stroke-linejoin="round" />

  <!-- Neural Network Edges (Representing AI/LLM Complexity) -->
  <g stroke="#2d3b4c" stroke-width="2" stroke-linecap="round">
    <!-- Perimeter Connections -->
    <line x1="28" y1="35" x2="45" y2="30" />
    <line x1="45" y1="30" x2="62" y2="35" />
    <line x1="22" y1="50" x2="68" y2="50" />
    <line x1="28" y1="65" x2="45" y2="70" />
    <line x1="45" y1="70" x2="62" y2="65" />
    <line x1="28" y1="35" x2="22" y2="50" />
    <line x1="62" y1="35" x2="68" y2="50" />
    <line x1="22" y1="50" x2="28" y2="65" />
    <line x1="68" y1="50" x2="62" y2="65" />
    
    <!-- Central Cross Connections -->
    <line x1="28" y1="35" x2="62" y2="65" />
    <line x1="62" y1="35" x2="28" y2="65" />
    <line x1="45" y1="30" x2="45" y2="70" />
    <line x1="22" y1="50" x2="68" y2="50" />
  </g>

  <!-- Network Nodes (Colorful Playground Elements) -->
  <g>
    <circle cx="28" cy="35" r="4.5" fill="#79b8ff" />
    <circle cx="45" cy="30" r="4.5" fill="#b392f0" />
    <circle cx="62" cy="35" r="4.5" fill="#79b8ff" />
    <circle cx="22" cy="50" r="4.5" fill="#b392f0" />
    <circle cx="68" cy="50" r="4.5" fill="#f97583" />
    <circle cx="28" cy="65" r="4.5" fill="#79b8ff" />
    <circle cx="45" cy="70" r="4.5" fill="#b392f0" />
    <circle cx="62" cy="65" r="4.5" fill="#79b8ff" />
  </g>

  <!-- Central Play Button (Representing the Playground/Sandbox) -->
  <g filter="url(#glow)">
    <polygon points="38,40 38,60 58,50" 
             fill="url(#playGradient)" 
             stroke="#36d1dc" 
             stroke-width="1" 
             stroke-linejoin="round" />
  </g>
</svg>
